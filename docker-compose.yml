version: '3.8'

services:
  # 1. Database Service
  database:
    image: mongo:6.0
    container_name: journal-database
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Backend Service
  backend:
    build: ./backend
    container_name: journal-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://database:27017/myjournal
      - BETTER_AUTH_URL=http://localhost:3000
    depends_on:
      - database
    volumes:
      - ./backend:/app
      - /app/node_modules

  # 3. Frontend Service
  frontend:
    build: ./frontend
    container_name: journal-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo-data:
